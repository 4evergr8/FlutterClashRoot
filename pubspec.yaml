name: clashroot
description: "simple clash control for root users"
publish_to: 'none'

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#000000"
  image: assets/aaa.png
  android: true
  ios: false
version: 2.2.1+15
environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  yaml_codec: ^1.0.0
  workmanager: ^0.9.0+3
  quick_settings_with_flutter_plugins: ^1.3.1
  yaml: ^3.1.3
  dio: ^5.10.0
  google_fonts: ^8.1.0
  crypto: ^3.0.7
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4
  path_provider: ^2.1.6
  path: ^1.9.1
  open_file: ^3.5.11
  flutter_native_splash: ^2.4.8
  flutter_device_apps: ^0.8.1
  flutter_foreground_task: ^9.2.2
  web_socket_client: ^0.2.1
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/aaa.png


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
