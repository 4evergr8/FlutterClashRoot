name: Build and Release Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
#
#      - name: Set up Flutter
#        uses: subosito/flutter-action@v2
#        with:
#          flutter-version: '3.44.1'
#
#      - name: Get dependencies
#        run: flutter pub get
#
#      - name: Build APK (按 ABI 分割)
#        run: flutter build apk --release --split-per-abi --no-tree-shake-icons
#
#      - name: 上传 arm64-v8a APK
#        uses: actions/upload-artifact@v7
#        with:
#          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
#          archive: false

      - name: Download GeoIP and Geosite
        run: |
          mkdir -p mihomoR
          curl -L -o mihomoR/geoip.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          curl -L -o mihomoR/geosite.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

#      - name: Copy APK to mihomoR
#        run: cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk mihomoR/

      - name: Download latest stable Mihomo release
        run: |
          RELEASE_JSON=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest)
          MIHOMO_URL=$(echo "$RELEASE_JSON" | grep -oP '"browser_download_url": "\K.*?mihomo-android-arm64-v8-v[0-9]+\.[0-9]+\.[0-9]+\.gz(?=")' | head -n 1)
          echo "Downloading Mihomo: $MIHOMO_URL"
          curl -L -o mihomoR/mihomo.gz "$MIHOMO_URL"
          gunzip -f mihomoR/mihomo.gz

      - name: Download latest stable MetaCubeXD release
        run: |
          RELEASE_JSON=$(curl -s https://api.github.com/repos/MetaCubeX/metacubexd/releases/latest)
          METACUBEXD_URL=$(echo "$RELEASE_JSON" | grep -oP '"browser_download_url": "\K.*?compressed-dist.tgz(?=")' | head -n 1)
          echo "Downloading MetaCubeXD: $METACUBEXD_URL"
          mkdir -p mihomoR/metacubexd
          curl -L -o metacubexd.tgz "$METACUBEXD_URL"
          tar -xzf metacubexd.tgz -C mihomoR/metacubexd
          rm metacubexd.tgz

      - name: Package mihomoR.zip
        run: |
          (cd mihomoR && zip -r ../mihomoR.zip .)

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: mihomoR.zip
          archive: false