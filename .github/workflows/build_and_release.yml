name: Build and Release Flutter APK

on:
  workflow_dispatch:

jobs:
  build-mihomoR:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'

      - name: Build APK (arm64-v8a)
        run: flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons

      - name: Prepare mihomoR folder
        run: |
          mkdir -p mihomoR

      - name: Download GeoIP and Geosite
        run: |
          curl -L -o mihomoR/geoip.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          curl -L -o mihomoR/geosite.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

      - name: Copy APK to mihomoR
        run: |
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk mihomoR/

      - name: Download latest stable Mihomo release
        run: |
          # 获取最新非 alpha release 版本的 download URL
          MIHOMO_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | jq -r '.assets[] | select(.name | test("mihomo-android-arm64-v8-v[0-9]+\\.[0-9]+\\.[0-9]+\\.gz")) | .browser_download_url')
          curl -L -o mihomoR/mihomo.gz "$MIHOMO_URL"
          gunzip -f mihomoR/mihomo.gz
          chmod +x mihomoR/mihomo

      - name: Download latest stable MetaCubeXD release
        run: |
          METACUBEXD_URL=$(curl -s https://api.github.com/repos/MetaCubeX/metacubexd/releases/latest \
            | jq -r '.assets[] | select(.name=="compressed-dist.tgz") | .browser_download_url')
          mkdir -p mihomoR/metacubexd
          curl -L -o metacubexd.tgz "$METACUBEXD_URL"
          tar -xzf metacubexd.tgz -C mihomoR/metacubexd
          rm metacubexd.tgz

      - name: Package mihomoR.zip
        run: |
          zip -r mihomoR.zip mihomoR

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomoR
          path: mihomoR.zip
          retention-days: 5